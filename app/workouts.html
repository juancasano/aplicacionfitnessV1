<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrenamientos - Fitness App</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/config.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/app-workouts.js"></script>
  <script defer src="js/ui.js"></script>
</head>
<body>
  <header>
    <h1>Entrenamientos</h1>
    <nav>
      <a href="users.html">Usuarios</a>
      <a href="workouts.html">Entrenamientos</a>
      <a href="exercises.html">Ejercicios</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <div id="errorDiv" class="error"></div>
      <form id="workoutForm">
        <input type="hidden" id="workoutId">
        <label>Nombre:<input id="name" type="text"></label>
        <label>Duración (min):<input id="duration" type="number"></label>
        <label>Usuario:<select id="userId"></select></label>
        <fieldset class="checkbox-grid" id="exercisesSelector"></fieldset>
        <div class="buttons">
          <button type="submit">Guardar</button>
          <button type="button" id="clearBtn" class="secondary">Limpiar</button>
        </div>
      </form>
    </section>
    <section class="card" style="margin-top: 24px;">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Duración</th>
              <th>Usuario</th>
              <th>Ejercicios</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="workoutRows"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
